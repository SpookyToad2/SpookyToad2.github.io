<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Text Sync</title>
    <!-- MQTT over WebSockets for firewall-free global sync -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0b0f;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hidden { display: none !important; }

        /* --- PC Interface --- */
        #pc-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 900px;
            height: 80%;
        }
        h2 {
            margin-bottom: 5px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }
        #status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #8a8a93;
            margin-bottom: 25px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ff453a; /* Red */
            box-shadow: 0 0 8px #ff453a;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .dot.connected {
            background-color: #30d158; /* Green */
            box-shadow: 0 0 8px #30d158;
        }
        textarea {
            width: 100%;
            flex-grow: 1;
            font-size: 20px;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid #2c2c2e;
            background: #1c1c1e;
            color: white;
            resize: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #0a84ff;
        }

        /* --- Phone Interface --- */
        #phone-view {
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Aligns content to the very top */
            align-items: center;        /* Centers text horizontally */
            width: 100vw;
            height: 100vh;
            /* 60px padding at the top protects against notches & status bars */
            padding: 60px 20px 30px 20px; 
            box-sizing: border-box;
            overflow: hidden;
        }
        #phone-status {
            font-size: 18px;
            color: #8a8a93;
            text-align: center;
            padding: 20px;
        }
        #live-text {
            white-space: pre-wrap;
            text-align: center;
            font-weight: 600;
            line-height: 1.15;
            word-break: normal;
            overflow-wrap: normal;
        }
    </style>
</head>
<body>

    <!-- PC WRITER VIEW -->
    <div id="pc-view" class="hidden">
        <h2>Live Text Broadcaster</h2>
        <div id="status-indicator">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Connecting to sync network...</span>
        </div>
        <textarea id="text-input" placeholder="Start typing here..."></textarea>
    </div>

    <!-- PHONE READER VIEW -->
    <div id="phone-view" class="hidden">
        <div id="phone-status">Connecting to sync network...</div>
        <span id="live-text" class="hidden"></span>
    </div>

    <script>
        // 1. Smart Device Detection
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

        // 2. Dynamic, Unique Room Channel based on your custom GitHub Pages URL.
        const cleanUrl = (window.location.hostname + window.location.pathname).replace(/[^a-zA-Z0-9]/g, '-');
        const syncTopic = `global-live-text-sync/${cleanUrl}`;

        // Public secure WebSockets broker
        const brokerUrl = 'wss://broker.emqx.io:8084/mqtt';

        if (!isMobile) {
            // ==========================================
            // PC (SENDER) LOGIC
            // ==========================================
            document.getElementById('pc-view').classList.remove('hidden');
            const textarea = document.getElementById('text-input');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            const client = mqtt.connect(brokerUrl, {
                clientId: 'pc_' + Math.random().toString(16).substr(2, 8),
                clean: true,
                connectTimeout: 4000,
                reconnectPeriod: 1000,
            });

            client.on('connect', () => {
                statusDot.classList.add('connected');
                statusText.innerText = "Connected globally! Anything you type here is live on your phone.";
                publishText(textarea.value);
            });

            client.on('close', () => {
                statusDot.classList.remove('connected');
                statusText.innerText = "Reconnecting to server...";
            });

            function publishText(text) {
                if (client.connected) {
                    client.publish(syncTopic, text || " ", { qos: 1, retain: true });
                }
            }

            textarea.addEventListener('input', (e) => {
                publishText(e.target.value);
            });

        } else {
            // ==========================================
            // PHONE (RECEIVER) LOGIC
            // ==========================================
            document.getElementById('phone-view').classList.remove('hidden');
            const liveTextEl = document.getElementById('live-text');
            const phoneStatusEl = document.getElementById('phone-status');
            const phoneViewEl = document.getElementById('phone-view');

            const client = mqtt.connect(brokerUrl, {
                clientId: 'phone_' + Math.random().toString(16).substr(2, 8),
                clean: true,
                connectTimeout: 4000,
                reconnectPeriod: 1000,
            });

            client.on('connect', () => {
                phoneStatusEl.innerText = "Connected! Write on your PC.";
                client.subscribe(syncTopic, { qos: 1 });
            });

            client.on('message', (topic, message) => {
                if (topic === syncTopic) {
                    const text = message.toString();
                    
                    if (text.trim() === "") {
                        phoneStatusEl.classList.remove('hidden');
                        phoneStatusEl.innerText = "Connected! Write on your PC.";
                        liveTextEl.classList.add('hidden');
                    } else {
                        phoneStatusEl.classList.add('hidden');
                        liveTextEl.classList.remove('hidden');
                        liveTextEl.innerText = text;
                        fitText(); // Scale instantly
                    }
                }
            });

            client.on('close', () => {
                phoneStatusEl.classList.remove('hidden');
                phoneStatusEl.innerText = "Connecting to sync network...";
                liveTextEl.classList.add('hidden');
            });

            // The dynamic mathematical fitting engine
            function fitText() {
                if (!liveTextEl.innerText || liveTextEl.classList.contains('hidden')) return;

                // Dynamically read CSS padding to calculate safe text bounds
                const style = window.getComputedStyle(phoneViewEl);
                const paddingX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
                const paddingY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);

                // Safe boundaries (viewport dimensions minus safety paddings)
                const maxW = phoneViewEl.clientWidth - paddingX;
                const maxH = phoneViewEl.clientHeight - paddingY;

                let min = 5;
                let max = 400; // Cap max font size so short words don't stretch into massive blocks
                let bestFit = 5;

                // Reset temporary layout parameters to get a clean visual calculation
                liveTextEl.style.fontSize = '10px';
                liveTextEl.style.display = 'inline-block';
                liveTextEl.style.width = 'auto';
                liveTextEl.style.maxWidth = maxW + 'px';

                // Binary search to find the exact boundary threshold
                while (min <= max) {
                    let mid = Math.floor((min + max) / 2);
                    liveTextEl.style.fontSize = mid + 'px';

                    // Check both physical box boundaries and text content scrolling space
                    const fitsWidth = liveTextEl.offsetWidth <= maxW && liveTextEl.scrollWidth <= maxW;
                    const fitsHeight = liveTextEl.offsetHeight <= maxH && liveTextEl.scrollHeight <= maxH;

                    if (fitsWidth && fitsHeight) {
                        bestFit = mid;
                        min = mid + 1; // It fits! Try a larger size
                    } else {
                        max = mid - 1; // Overflowed, dial it back
                    }
                }

                // Apply the absolute maximum safe size
                liveTextEl.style.fontSize = bestFit + 'px';
                liveTextEl.style.maxWidth = maxW + 'px';
            }

            // Recalculate size instantly when phone rotates
            window.addEventListener('resize', fitText);
        }
    </script>
</body>
</html>
