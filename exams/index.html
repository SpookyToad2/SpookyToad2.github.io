<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Text Sync</title>
    <!-- MQTT over WebSockets for flawless, firewall-free global sync -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0b0f;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hidden { display: none !important; }

        /* --- PC Interface --- */
        #pc-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 900px;
            height: 80%;
        }
        h2 {
            margin-bottom: 5px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }
        #status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #8a8a93;
            margin-bottom: 25px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ff453a; /* Red */
            box-shadow: 0 0 8px #ff453a;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .dot.connected {
            background-color: #30d158; /* Green */
            box-shadow: 0 0 8px #30d158;
        }
        textarea {
            width: 100%;
            flex-grow: 1;
            font-size: 20px;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid #2c2c2e;
            background: #1c1c1e;
            color: white;
            resize: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #0a84ff;
        }

        /* --- Phone Interface --- */
        #phone-view {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }
        #live-text {
            white-space: pre-wrap;
            text-align: center;
            font-weight: 600;
            line-height: 1.15;
            width: 100%;
            word-break: break-word;
        }
    </style>
</head>
<body>

    <!-- PC WRITER VIEW -->
    <div id="pc-view" class="hidden">
        <h2>Live Text Broadcaster</h2>
        <div id="status-indicator">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Connecting to sync network...</span>
        </div>
        <textarea id="text-input" placeholder="Start typing here..."></textarea>
    </div>

    <!-- PHONE READER VIEW -->
    <div id="phone-view" class="hidden">
        <span id="live-text">Connecting...</span>
    </div>

    <script>
        // 1. Smart Device Detection
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

        // 2. Dynamic, Unique Room Channel based on your custom GitHub Pages URL.
        // This ensures your PC and phone link only to each other, without interfering with anyone else.
        const cleanUrl = (window.location.hostname + window.location.pathname).replace(/[^a-zA-Z0-9]/g, '-');
        const syncTopic = `global-live-text-sync/${cleanUrl}`;

        // Using EMQX's ultra-reliable, public secure WebSockets broker
        const brokerUrl = 'wss://broker.emqx.io:8084/mqtt';

        if (!isMobile) {
            // ==========================================
            // PC (SENDER) LOGIC
            // ==========================================
            document.getElementById('pc-view').classList.remove('hidden');
            const textarea = document.getElementById('text-input');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            const client = mqtt.connect(brokerUrl, {
                clientId: 'pc_' + Math.random().toString(16).substr(2, 8),
                clean: true,
                connectTimeout: 4000,
                reconnectPeriod: 1000,
            });

            client.on('connect', () => {
                statusDot.classList.add('connected');
                statusText.innerText = "Connected globally! Anything you type here is live on your phone.";
                
                // Publish current text on startup (retained, so phone grabs it immediately)
                publishText(textarea.value);
            });

            client.on('close', () => {
                statusDot.classList.remove('connected');
                statusText.innerText = "Reconnecting to server...";
            });

            function publishText(text) {
                if (client.connected) {
                    // retain: true saves the message on the server, serving it instantly to the phone when it connects
                    client.publish(syncTopic, text || " ", { qos: 1, retain: true });
                }
            }

            textarea.addEventListener('input', (e) => {
                publishText(e.target.value);
            });

        } else {
            // ==========================================
            // PHONE (RECEIVER) LOGIC
            // ==========================================
            document.getElementById('phone-view').classList.remove('hidden');
            const liveTextEl = document.getElementById('live-text');

            const client = mqtt.connect(brokerUrl, {
                clientId: 'phone_' + Math.random().toString(16).substr(2, 8),
                clean: true,
                connectTimeout: 4000,
                reconnectPeriod: 1000,
            });

            client.on('connect', () => {
                liveTextEl.innerText = "Connected! Waiting for typing...";
                liveTextEl.style.fontSize = "24px";
                
                client.subscribe(syncTopic, { qos: 1 });
            });

            client.on('message', (topic, message) => {
                if (topic === syncTopic) {
                    const text = message.toString();
                    liveTextEl.innerText = text;
                    fitText(); // Instantly scale up font size
                }
            });

            client.on('close', () => {
                liveTextEl.innerText = "Connecting to sync network...";
                liveTextEl.style.fontSize = "24px";
            });

            // The mathematical fitting engine
            function fitText() {
                if (!liveTextEl.innerText) return;

                let min = 10;
                let max = 600; // Limits font from growing into abstract art for short words
                let bestFit = 10;

                while (min <= max) {
                    let mid = Math.floor((min + max) / 2);
                    liveTextEl.style.fontSize = mid + 'px';

                    // Checks if text fits within 92% of the screen limits
                    if (liveTextEl.offsetWidth <= window.innerWidth * 0.92 && 
                        liveTextEl.offsetHeight <= window.innerHeight * 0.92) {
                        bestFit = mid;
                        min = mid + 1; // It fits! Let's try bigger
                    } else {
                        max = mid - 1; // Overflowed, dial it back
                    }
                }
                
                liveTextEl.style.fontSize = bestFit + 'px';
            }

            window.addEventListener('resize', fitText);
        }
    </script>
</body>
</html>
