<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Синхронизация текста</title>
    <!-- MQTT через WebSockets для надежной глобальной синхронизации без блокировок -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* Базовые настройки страницы: убираем глобальное центрирование flex, чтобы не ломать верстку */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0b0f;
            color: #ffffff;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        /* --- Интерфейс для ПК --- */
        #pc-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 900px;
            height: 80%;
            margin: 5% auto; /* Центрируем панель на экране ПК */
        }
        h2 {
            margin-bottom: 5px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }
        #status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #8a8a93;
            margin-bottom: 25px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ff453a; /* Красный (отключено) */
            box-shadow: 0 0 8px #ff453a;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .dot.connected {
            background-color: #30d158; /* Зеленый (подключено) */
            box-shadow: 0 0 8px #30d158;
        }
        textarea {
            width: 100%;
            flex-grow: 1;
            font-size: 20px;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid #2c2c2e;
            background: #1c1c1e;
            color: white;
            resize: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #0a84ff;
        }

        /* --- Интерфейс для телефона --- */
        #phone-view {
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Прижимаем текст строго к верху */
            align-items: center;        /* Центрируем текст по горизонтали */
            width: 100%;
            height: 100%;               /* Использование 100% высоты предотвращает баги с высотой на iOS/Android */
            /* Отступ сверху 40px защищает текст от "челок", камер и системных строк */
            padding: 40px 20px 20px 20px; 
            box-sizing: border-box;
            overflow: hidden;
        }
        #phone-status {
            font-size: 18px;
            color: #8a8a93;
            text-align: center;
            padding: 20px;
        }
        #live-text {
            margin: 0;
            padding: 0;
            white-space: pre-wrap;
            text-align: center;
            font-weight: 600;
            line-height: 1.15;
            word-break: normal;
            overflow-wrap: normal;
        }
    </style>
</head>
<body>

    <!-- ИНТЕРФЕЙС ДЛЯ ПК (ВВОД) -->
    <div id="pc-view" class="hidden">
        <h2>Трансляция текста</h2>
        <div id="status-indicator">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Подключение к сети синхронизации...</span>
        </div>
        <textarea id="text-input" placeholder="Начните вводить текст здесь..."></textarea>
    </div>

    <!-- ИНТЕРФЕЙС ДЛЯ ТЕЛЕФОНА (ВЫВОД) -->
    <div id="phone-view" class="hidden">
        <div id="phone-status">Подключение к сети синхронизации...</div>
        <span id="live-text" class="hidden"></span>
    </div>

    <script>
        // 1. Умное определение типа устройства
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

        // 2. Генерация уникального канала на основе ссылки вашего GitHub Pages.
        // Это гарантирует, что ваши устройства соединятся только друг с другом.
        const cleanUrl = (window.location.hostname + window.location.pathname).replace(/[^a-zA-Z0-9]/g, '-');
        const syncTopic = `global-live-text-sync/${cleanUrl}`;

        // Надежный публичный WebSockets брокер от EMQX
        const brokerUrl = 'wss://broker.emqx.io:8084/mqtt';

        if (!isMobile) {
            // ==========================================
            // ЛОГИКА ДЛЯ ПК (ОТПРАВИТЕЛЬ)
            // ==========================================
            document.getElementById('pc-view').classList.remove('hidden');
            const textarea = document.getElementById('text-input');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            const client = mqtt.connect(brokerUrl, {
                clientId: 'pc_' + Math.random().toString(16).substr(2, 8),
                clean: true,
                connectTimeout: 4000,
                reconnectPeriod: 1000,
            });

            client.on('connect', () => {
                statusDot.classList.add('connected');
                statusText.innerText = "Подключено! Всё, что вы здесь пишете, мгновенно отображается на телефоне.";
                publishText(textarea.value);
            });

            client.on('close', () => {
                statusDot.classList.remove('connected');
                statusText.innerText = "Переподключение к серверу...";
            });

            function publishText(text) {
                if (client.connected) {
                    // retain: true сохраняет последнее сообщение на сервере, чтобы телефон сразу его загрузил при открытии
                    client.publish(syncTopic, text || " ", { qos: 1, retain: true });
                }
            }

            textarea.addEventListener('input', (e) => {
                publishText(e.target.value);
            });

        } else {
            // ==========================================
            // ЛОГИКА ДЛЯ ТЕЛЕФОНА (ПОЛУЧАТЕЛЬ)
            // ==========================================
            document.getElementById('phone-view').classList.remove('hidden');
            const liveTextEl = document.getElementById('live-text');
            const phoneStatusEl = document.getElementById('phone-status');
            const phoneViewEl = document.getElementById('phone-view');

            const client = mqtt.connect(brokerUrl, {
                clientId: 'phone_' + Math.random().toString(16).substr(2, 8),
                clean: true,
                connectTimeout: 4000,
                reconnectPeriod: 1000,
            });

            client.on('connect', () => {
                phoneStatusEl.innerText = "Подключено! Пишите на ПК.";
                client.subscribe(syncTopic, { qos: 1 });
            });

            client.on('message', (topic, message) => {
                if (topic === syncTopic) {
                    const text = message.toString();
                    
                    if (text.trim() === "") {
                        phoneStatusEl.classList.remove('hidden');
                        phoneStatusEl.innerText = "Подключено! Пишите на ПК.";
                        liveTextEl.classList.add('hidden');
                    } else {
                        phoneStatusEl.classList.add('hidden');
                        liveTextEl.classList.remove('hidden');
                        liveTextEl.innerText = text;
                        fitText(); // Мгновенный расчет размера
                    }
                }
            });

            client.on('close', () => {
                phoneStatusEl.classList.remove('hidden');
                phoneStatusEl.innerText = "Подключение к сети...";
                liveTextEl.classList.add('hidden');
            });

            // Математический движок подстройки размера текста под экран
            function fitText() {
                if (!liveTextEl.innerText || liveTextEl.classList.contains('hidden')) return;

                // Считываем текущие отступы (padding) контейнера для точных расчетов границ
                const style = window.getComputedStyle(phoneViewEl);
                const paddingX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
                const paddingY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);

                // Безопасные границы для текста
                const maxW = phoneViewEl.clientWidth - paddingX;
                const maxH = phoneViewEl.clientHeight - paddingY;

                let min = 10;
                let max = 180; // Максимальный лимит шрифта, чтобы короткие слова не растягивались на весь экран по высоте
                let bestFit = 10;

                // Сброс временных параметров для точного замера браузером размеров текста
                liveTextEl.style.fontSize = '10px';
                liveTextEl.style.display = 'inline-block';
                liveTextEl.style.width = 'auto';
                liveTextEl.style.maxWidth = maxW + 'px';

                // Бинарный поиск оптимального размера шрифта
                while (min <= max) {
                    let mid = Math.floor((min + max) / 2);
                    liveTextEl.style.fontSize = mid + 'px';

                    // Проверяем физические границы элемента и появление скроллов
                    const fitsWidth = liveTextEl.offsetWidth <= maxW && liveTextEl.scrollWidth <= maxW;
                    const fitsHeight = liveTextEl.offsetHeight <= maxH && liveTextEl.scrollHeight <= maxH;

                    if (fitsWidth && fitsHeight) {
                        bestFit = mid;
                        min = mid + 1; // Текст поместился, пробуем сделать больше
                    } else {
                        max = mid - 1; // Вышли за границы, уменьшаем размер
                    }
                }

                // Применяем максимально возможный безопасный размер
                liveTextEl.style.fontSize = bestFit + 'px';
                liveTextEl.style.maxWidth = maxW + 'px';
            }

            // Пересчитываем размер шрифта при перевороте экрана телефона
            window.addEventListener('resize', fitText);
        }
    </script>
</body>
</html>
