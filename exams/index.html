<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Text Sync</title>
    <!-- PeerJS for direct, serverless browser-to-browser connection -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0b0f;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hidden { display: none !important; }

        /* --- PC Interface --- */
        #pc-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 900px;
            height: 80%;
        }
        h2 {
            margin-bottom: 5px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }
        #status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #8a8a93;
            margin-bottom: 25px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ff453a; /* Red: disconnected */
            box-shadow: 0 0 8px #ff453a;
        }
        .dot.connected {
            background-color: #30d158; /* Green: connected */
            box-shadow: 0 0 8px #30d158;
        }
        textarea {
            width: 100%;
            flex-grow: 1;
            font-size: 20px;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid #2c2c2e;
            background: #1c1c1e;
            color: white;
            resize: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #0a84ff;
        }

        /* --- Phone Interface --- */
        #phone-view {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            padding: 10px;
            box-sizing: border-box;
        }
        #live-text {
            white-space: pre-wrap;
            text-align: center;
            font-weight: 600;
            line-height: 1.1;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- PC WRITER VIEW -->
    <div id="pc-view" class="hidden">
        <h2>Live Text Broadcaster</h2>
        <div id="status-indicator">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Waiting for phone to open this website...</span>
        </div>
        <textarea id="text-input" placeholder="Start typing here..."></textarea>
    </div>

    <!-- PHONE READER VIEW -->
    <div id="phone-view" class="hidden">
        <span id="live-text">Syncing...</span>
    </div>

    <script>
        // 1. Smart Device Detection
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

        // 2. Generate a globally unique, deterministic room ID based on your GitHub Pages URL
        // This ensures your phone and PC connect ONLY to each other, with no collisions.
        const cleanUrl = (window.location.hostname + window.location.pathname).replace(/[^a-zA-Z0-9]/g, '-');
        const hostId = `${cleanUrl}-host`.substring(0, 80);

        if (!isMobile) {
            // ==========================================
            // PC (SENDER) LOGIC
            // ==========================================
            document.getElementById('pc-view').classList.remove('hidden');
            const textarea = document.getElementById('text-input');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            // PC registers with the unique Host ID
            const peer = new Peer(hostId);
            let activeConnection = null;

            peer.on('open', () => {
                console.log("Broadcaster active. Waiting for receiver on ID:", hostId);
            });

            // When the phone opens the page, it will connect to this PC
            peer.on('connection', (conn) => {
                activeConnection = conn;
                statusDot.classList.add('connected');
                statusText.innerText = "Phone connected! Sending live text.";

                // Send current textarea value immediately on connect
                conn.send(textarea.value);

                conn.on('close', () => {
                    statusDot.classList.remove('connected');
                    statusText.innerText = "Phone disconnected. Ready to reconnect...";
                    activeConnection = null;
                });
            });

            // Send text updates in real-time as you type
            textarea.addEventListener('input', () => {
                if (activeConnection && activeConnection.open) {
                    activeConnection.send(textarea.value);
                }
            });

        } else {
            // ==========================================
            // PHONE (RECEIVER) LOGIC
            // ==========================================
            document.getElementById('phone-view').classList.remove('hidden');
            const liveTextEl = document.getElementById('live-text');

            const peer = new Peer(); // Let peer assign a random ID to the phone
            let connection = null;

            function connectToPC() {
                liveTextEl.innerText = "Searching for PC...";
                liveTextEl.style.color = "#8a8a93";
                liveTextEl.style.fontSize = "24px";

                connection = peer.connect(hostId);

                connection.on('open', () => {
                    liveTextEl.innerText = "Connected! Write on your PC.";
                    liveTextEl.style.color = "#ffffff";
                    fitText();
                });

                connection.on('data', (data) => {
                    liveTextEl.innerText = data || " ";
                    fitText(); // Instantly calculate perfect font size
                });

                connection.on('close', () => {
                    // If PC disconnects, try to reconnect every 2 seconds
                    setTimeout(connectToPC, 2000);
                });
            }

            peer.on('open', () => {
                connectToPC();
            });

            peer.on('error', (err) => {
                // If PC is not online yet, retry
                if (err.type === 'peer-allowed-active-connections' || err.type === 'peer-unavailable') {
                    setTimeout(connectToPC, 2000);
                }
            });

            // Mathematical calculation to fit text perfectly on the screen
            function fitText() {
                if (!liveTextEl.innerText) return;

                let min = 10;
                let max = 600; // Cap max size to prevent insane stretching on brief words
                let bestFit = 10;

                // Binary search algorithm to find the absolute maximum size
                while (min <= max) {
                    let mid = Math.floor((min + max) / 2);
                    liveTextEl.style.fontSize = mid + 'px';

                    // Check boundaries against 92% of the screen limits
                    if (liveTextEl.offsetWidth <= window.innerWidth * 0.92 && 
                        liveTextEl.offsetHeight <= window.innerHeight * 0.92) {
                        bestFit = mid;
                        min = mid + 1; // It fits, try slightly larger
                    } else {
                        max = mid - 1; // It overflowed, go smaller
                    }
                }
                
                liveTextEl.style.fontSize = bestFit + 'px';
            }

            // Recalculate on screen rotation
            window.addEventListener('resize', fitText);
        }
    </script>
</body>
</html>
