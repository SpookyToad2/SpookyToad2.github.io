<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accurate Vocal Range Tester</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --success: #22c55e;
      --text: #f8fafc;
      --subtext: #94a3b8;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      background: var(--card);
      padding: 2rem;
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      text-align: center;
    }
    h1 { margin-top: 0; color: var(--accent); }
    p { color: var(--subtext); font-size: 0.95rem; }
    button {
      background: var(--accent);
      color: #0f172a;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin: 8px;
      transition: all 0.2s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: 0.9; }
    .display-box {
      margin: 15px 0;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }
    .note { font-size: 2.5rem; font-weight: bold; color: var(--accent); }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }
    .stat-card {
      background: rgba(255,255,255,0.03);
      padding: 12px;
      border-radius: 6px;
    }
    .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--success); }
    .status { font-size: 0.9rem; color: #f59e0b; margin-top: 5px; height: 20px; }
    .progress-bar {
      width: 100%;
      background: rgba(255,255,255,0.1);
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 10px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Vocal Range Tester</h1>
  <p>Sing clearly and hold each note for a fraction of a second to log your high and low bounds.</p>

  <button id="startBtn">1. Enable Mic & Calibrate</button>
  <div id="status" class="status">Click to begin calibration</div>

  <div class="display-box">
    <div>Live Pitch Detection</div>
    <div id="currentNote" class="note">--</div>
    <div id="currentFreq" style="color: var(--subtext);">0 Hz</div>
    <div class="progress-bar"><div id="holdProgress" class="progress-fill"></div></div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div>Lowest Sustained</div>
      <div id="lowestNote" class="stat-val">--</div>
    </div>
    <div class="stat-card">
      <div>Highest Sustained</div>
      <div id="highestNote" class="stat-val">--</div>
    </div>
  </div>

  <div class="display-box">
    <div>Total Vocal Range</div>
    <div id="octaveSpan" class="note" style="font-size: 1.6rem; color: var(--text);">0 Octaves</div>
  </div>

  <button id="resetBtn">Reset Range</button>
</div>

<script>
  let audioCtx, analyser, micStream;
  let noiseFloorThreshold = 0.02; // Default noise gate RMS
  let lowestMidi = Infinity;
  let highestMidi = -Infinity;

  // Stability tracking variables
  let candidateMidi = null;
  let noteHoldStartTime = 0;
  const REQUIRED_HOLD_TIME = 300; // Time in ms to sustain note to confirm it

  const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

  document.getElementById('startBtn').addEventListener('click', startProcess);
  document.getElementById('resetBtn').addEventListener('click', resetRange);

  async function startProcess() {
    const btn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    btn.disabled = true;

    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;

      const source = audioCtx.createMediaStreamSource(micStream);
      source.connect(analyser);

      // Calibration Phase
      status.innerText = "Stay quiet... calibrating room noise (3s)";
      await calibrateNoiseFloor();
      status.innerText = "Ready! Sing your lowest and highest notes.";
      status.style.color = "#22c55e";
      btn.style.display = 'none';

      detectPitch();
    } catch (err) {
      status.innerText = "Error accessing microphone.";
      btn.disabled = false;
    }
  }

  function calibrateNoiseFloor() {
    return new Promise(resolve => {
      let samples = [];
      const startTime = Date.now();
      
      const sampleInterval = setInterval(() => {
        const buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);
        let sum = 0;
        for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
        samples.push(Math.sqrt(sum / buffer.length));

        if (Date.now() - startTime >= 3000) {
          clearInterval(sampleInterval);
          const avgNoise = samples.reduce((a, b) => a + b, 0) / samples.length;
          // Set noise gate threshold slightly above average noise floor
          noiseFloorThreshold = Math.max(avgNoise * 2.5, 0.015);
          resolve();
        }
      }, 100);
    });
  }

  // YIN-based Pitch Detection algorithm
  function yinPitchDetect(buffer, sampleRate) {
    let SIZE = buffer.length / 2;
    let sum = 0;
    let rms = 0;

    for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
    rms = Math.sqrt(rms / buffer.length);
    if (rms < noiseFloorThreshold) return -1; // Ignore sounds under noise gate

    let yinBuffer = new Float32Array(SIZE);
    yinBuffer[0] = 1;

    let runningSum = 0;
    for (let tau = 1; tau < SIZE; tau++) {
      let diffSum = 0;
      for (let i = 0; i < SIZE; i++) {
        let delta = buffer[i] - buffer[i + tau];
        diffSum += delta * delta;
      }
      runningSum += diffSum;
      yinBuffer[tau] = diffSum * tau / runningSum;
    }

    let probabilityThreshold = 0.15;
    let tauEstimate = -1;
    for (let tau = 2; tau < SIZE; tau++) {
      if (yinBuffer[tau] < probabilityThreshold) {
        while (tau + 1 < SIZE && yinBuffer[tau + 1] < yinBuffer[tau]) tau++;
        tauEstimate = tau;
        break;
      }
    }

    if (tauEstimate === -1) return -1;
    return sampleRate / tauEstimate;
  }

  function detectPitch() {
    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    const freq = yinPitchDetect(buffer, audioCtx.sampleRate);

    // Filter out frequencies outside human vocal bounds (~60 Hz to 1500 Hz)
    if (freq > 60 && freq < 1500) {
      const midi = Math.round(69 + 12 * Math.log2(freq / 440));
      const noteName = midiToNote(midi);

      document.getElementById('currentNote').innerText = noteName;
      document.getElementById('currentFreq').innerText = Math.round(freq) + " Hz";

      processSustainedPitch(midi, noteName);
    } else {
      resetStabilityCheck();
    }

    requestAnimationFrame(detectPitch);
  }

  function processSustainedPitch(midi, noteName) {
    const now = Date.now();
    
    if (candidateMidi === midi) {
      const heldTime = now - noteHoldStartTime;
      const progressPercent = Math.min((heldTime / REQUIRED_HOLD_TIME) * 100, 100);
      document.getElementById('holdProgress').style.width = progressPercent + "%";

      if (heldTime >= REQUIRED_HOLD_TIME) {
        commitValidPitch(midi, noteName);
      }
    } else {
      candidateMidi = midi;
      noteHoldStartTime = now;
      document.getElementById('holdProgress').style.width = "0%";
    }
  }

  function resetStabilityCheck() {
    candidateMidi = null;
    document.getElementById('holdProgress').style.width = "0%";
    document.getElementById('currentNote').innerText = "--";
    document.getElementById('currentFreq').innerText = "0 Hz";
  }

  function commitValidPitch(midi, noteName) {
    if (midi < lowestMidi) {
      lowestMidi = midi;
      document.getElementById('lowestNote').innerText = noteName;
    }
    if (midi > highestMidi) {
      highestMidi = midi;
      document.getElementById('highestNote').innerText = noteName;
    }

    if (lowestMidi !== Infinity && highestMidi !== -Infinity) {
      const semitones = highestMidi - lowestMidi;
      const octaves = (semitones / 12).toFixed(1);
      document.getElementById('octaveSpan').innerText = `${octaves} Octaves (${semitones} Semitones)`;
    }
  }

  function midiToNote(midi) {
    const note = noteNames[midi % 12];
    const octave = Math.floor(midi / 12) - 1;
    return note + octave;
  }

  function resetRange() {
    lowestMidi = Infinity;
    highestMidi = -Infinity;
    document.getElementById('lowestNote').innerText = "--";
    document.getElementById('highestNote').innerText = "--";
    document.getElementById('octaveSpan').innerText = "0 Octaves";
    resetStabilityCheck();
  }
</script>
</body>
</html>
