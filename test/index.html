<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocal Range Tester</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --success: #22c55e;
      --text: #f8fafc;
      --subtext: #94a3b8;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      background: var(--card);
      padding: 2rem;
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      text-align: center;
    }
    h1 { margin-top: 0; color: var(--accent); }
    p { color: var(--subtext); font-size: 0.95rem; }
    button {
      background: var(--accent);
      color: #0f172a;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin: 8px;
      transition: all 0.2s;
    }
    button:hover { opacity: 0.9; }
    .display-box {
      margin: 15px 0;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }
    .note { font-size: 2.5rem; font-weight: bold; color: var(--accent); }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }
    .stat-card {
      background: rgba(255,255,255,0.03);
      padding: 12px;
      border-radius: 6px;
    }
    .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--success); }
    
    /* Meter Styling */
    .meter-container {
      margin: 10px 0;
      text-align: left;
    }
    .meter-label { font-size: 0.8rem; color: var(--subtext); margin-bottom: 4px; display: flex; justify-content: space-between;}
    .bar-bg {
      width: 100%;
      background: rgba(255,255,255,0.1);
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.05s ease-out;
    }
    .hold-fill {
      background: var(--success);
      transition: width 0.05s linear;
    }
    
    /* Control Slider */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 15px 0;
      background: rgba(0,0,0,0.2);
      padding: 10px;
      border-radius: 8px;
    }
    input[type=range] { width: 100%; }
  </style>
</head>
<body>

<div class="container">
  <h1>Vocal Range Tester</h1>
  <p>Sing into your mic. Hold a steady tone to lock in your highest and lowest notes.</p>

  <button id="startBtn">Start Microphone</button>

  <div class="controls">
    <div class="meter-label">
      <span>Mic Sensitivity Gate</span>
      <span id="gateVal">2%</span>
    </div>
    <input type="range" id="gateSlider" min="0.005" max="0.1" step="0.005" value="0.02">
  </div>

  <div class="meter-container">
    <div class="meter-label"><span>Input Volume</span></div>
    <div class="bar-bg"><div id="volumeBar" class="bar-fill"></div></div>
  </div>

  <div class="display-box">
    <div>Live Pitch</div>
    <div id="currentNote" class="note">--</div>
    <div id="currentFreq" style="color: var(--subtext);">0 Hz</div>
    
    <div class="meter-container" style="margin-top:10px;">
      <div class="meter-label"><span>Hold Note Stability</span></div>
      <div class="bar-bg"><div id="holdBar" class="bar-fill hold-fill"></div></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div>Lowest Pitch</div>
      <div id="lowestNote" class="stat-val">--</div>
    </div>
    <div class="stat-card">
      <div>Highest Pitch</div>
      <div id="highestNote" class="stat-val">--</div>
    </div>
  </div>

  <div class="display-box">
    <div>Vocal Range</div>
    <div id="octaveSpan" class="note" style="font-size: 1.5rem; color: var(--text);">0 Octaves</div>
  </div>

  <button id="resetBtn">Reset Recorded Range</button>
</div>

<script>
  let audioCtx, analyser, micStream;
  let noiseGate = 0.02;
  let lowestMidi = Infinity;
  let highestMidi = -Infinity;

  // Stability tracking
  let candidateMidi = null;
  let noteStartTime = 0;
  const HOLD_DURATION = 220; // Time in milliseconds required to confirm a note

  const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

  document.getElementById('startBtn').addEventListener('click', startAudio);
  document.getElementById('resetBtn').addEventListener('click', resetRange);
  
  const gateSlider = document.getElementById('gateSlider');
  gateSlider.addEventListener('input', (e) => {
    noiseGate = parseFloat(e.target.value);
    document.getElementById('gateVal').innerText = Math.round(noiseGate * 100) + "%";
  });

  async function startAudio() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;

      const source = audioCtx.createMediaStreamSource(micStream);
      source.connect(analyser);

      document.getElementById('startBtn').style.display = 'none';
      processAudio();
    } catch (err) {
      alert("Microphone access is required. Check permissions.");
    }
  }

  function autoCorrelate(buffer, sampleRate) {
    let SIZE = buffer.length;
    let sumSquares = 0;

    for (let i = 0; i < SIZE; i++) {
      sumSquares += buffer[i] * buffer[i];
    }
    let rms = Math.sqrt(sumSquares / SIZE);

    // Update Volume UI Bar
    const volPercent = Math.min(rms * 400, 100);
    document.getElementById('volumeBar').style.width = volPercent + "%";

    // Silence Gate Check
    if (rms < noiseGate) return -1;

    // Autocorrelation Pitch Extraction
    let r1 = 0, r2 = SIZE - 1, thres = 0.2;
    for (let i = 0; i < SIZE / 2; i++) {
      if (Math.abs(buffer[i]) < thres) { r1 = i; break; }
    }
    for (let i = 1; i < SIZE / 2; i++) {
      if (Math.abs(buffer[SIZE - i]) < thres) { r2 = SIZE - i; break; }
    }

    buffer = buffer.slice(r1, r2);
    SIZE = buffer.length;

    let c = new Array(SIZE).fill(0);
    for (let i = 0; i < SIZE; i++) {
      for (let j = 0; j < SIZE - i; j++) {
        c[i] = c[i] + buffer[j] * buffer[j + i];
      }
    }

    let d = 0; 
    while (c[d] > c[d + 1]) d++;
    let maxval = -1, maxpos = -1;
    for (let i = d; i < SIZE; i++) {
      if (c[i] > maxval) {
        maxval = c[i];
        maxpos = i;
      }
    }
    let T0 = maxpos;

    // Parabolic interpolation for smoother accuracy
    let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
    let a = (x1 + x3 - 2 * x2) / 2;
    let b = (x3 - x1) / 2;
    if (a) T0 = T0 - b / (2 * a);

    return sampleRate / T0;
  }

  function processAudio() {
    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    const freq = autoCorrelate(buffer, audioCtx.sampleRate);

    // Standard human vocal frequency bounds (~65Hz C2 to ~1300Hz E6)
    if (freq > 65 && freq < 1300) {
      const midi = Math.round(69 + 12 * Math.log2(freq / 440));
      const noteName = midiToNote(midi);

      document.getElementById('currentNote').innerText = noteName;
      document.getElementById('currentFreq').innerText = Math.round(freq) + " Hz";

      handleHoldCheck(midi, noteName);
    } else {
      resetHoldBar();
    }

    requestAnimationFrame(processAudio);
  }

  function handleHoldCheck(midi, noteName) {
    const now = Date.now();

    if (candidateMidi === midi) {
      const elapsed = now - noteStartTime;
      const progressPercent = Math.min((elapsed / HOLD_DURATION) * 100, 100);
      document.getElementById('holdBar').style.width = progressPercent + "%";

      if (elapsed >= HOLD_DURATION) {
        registerNote(midi, noteName);
      }
    } else {
      candidateMidi = midi;
      noteStartTime = now;
      document.getElementById('holdBar').style.width = "0%";
    }
  }

  function resetHoldBar() {
    candidateMidi = null;
    document.getElementById('holdBar').style.width = "0%";
    document.getElementById('currentNote').innerText = "--";
    document.getElementById('currentFreq').innerText = "0 Hz";
  }

  function registerNote(midi, noteName) {
    if (midi < lowestMidi) {
      lowestMidi = midi;
      document.getElementById('lowestNote').innerText = noteName;
    }
    if (midi > highestMidi) {
      highestMidi = midi;
      document.getElementById('highestNote').innerText = noteName;
    }

    if (lowestMidi !== Infinity && highestMidi !== -Infinity) {
      const semitones = highestMidi - lowestMidi;
      const octaves = (semitones / 12).toFixed(1);
      document.getElementById('octaveSpan').innerText = `${octaves} Octaves (${semitones} Semitones)`;
    }
  }

  function midiToNote(midi) {
    const note = noteNames[midi % 12];
    const octave = Math.floor(midi / 12) - 1;
    return note + octave;
  }

  function resetRange() {
    lowestMidi = Infinity;
    highestMidi = -Infinity;
    document.getElementById('lowestNote').innerText = "--";
    document.getElementById('highestNote').innerText = "--";
    document.getElementById('octaveSpan').innerText = "0 Octaves";
    resetHoldBar();
  }
</script>
</body>
</html>
